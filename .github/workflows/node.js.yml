name: Node.js CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Init submodules and dependencies
        run: sh init.sh

      - name: Check TypeScript version
        run: pnpm exec tsc -v

      - name: Run check
        run: pnpm check

      - name: Run check:test
        run: pnpm check:test

      - name: Run check:smith
        run: pnpm check:smith

      - name: Build
        run: pnpm build
